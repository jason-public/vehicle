<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사업용 화물자동차 세부유형 조회 시스템</title>
    <style>
        :root {
  --color-white: rgba(255, 255, 255, 1);
  --color-black: rgba(0, 0, 0, 1);
  --color-cream-50: rgba(252, 252, 249, 1);
  --color-cream-100: rgba(255, 255, 253, 1);
  --color-gray-200: rgba(245, 245, 245, 1);
  --color-gray-300: rgba(167, 169, 169, 1);
  --color-gray-400: rgba(119, 124, 124, 1);
  --color-slate-500: rgba(98, 108, 113, 1);
  --color-brown-600: rgba(94, 82, 64, 1);
  --color-charcoal-700: rgba(31, 33, 33, 1);
  --color-charcoal-800: rgba(38, 40, 40, 1);
  --color-slate-900: rgba(19, 52, 59, 1);
  --color-teal-300: rgba(50, 184, 198, 1);
  --color-teal-400: rgba(45, 166, 178, 1);
  --color-teal-500: rgba(33, 128, 141, 1);
  --color-teal-600: rgba(29, 116, 128, 1);
  --color-teal-700: rgba(26, 104, 115, 1);
  --color-teal-800: rgba(41, 150, 161, 1);
  --color-red-400: rgba(255, 84, 89, 1);
  --color-red-500: rgba(192, 21, 47, 1);
  --color-orange-400: rgba(230, 129, 97, 1);
  --color-orange-500: rgba(168, 75, 47, 1);
  --color-brown-600-rgb: 94, 82, 64;
  --color-teal-500-rgb: 33, 128, 141;
  --color-slate-900-rgb: 19, 52, 59;
  --color-slate-500-rgb: 98, 108, 113;
  --color-red-500-rgb: 192, 21, 47;
  --color-red-400-rgb: 255, 84, 89;
  --color-orange-500-rgb: 168, 75, 47;
  --color-orange-400-rgb: 230, 129, 97;
  --color-bg-1: rgba(59, 130, 246, 0.08);
  --color-bg-2: rgba(245, 158, 11, 0.08);
  --color-bg-3: rgba(34, 197, 94, 0.08);
  --color-bg-4: rgba(239, 68, 68, 0.08);
  --color-bg-5: rgba(147, 51, 234, 0.08);
  --color-bg-6: rgba(249, 115, 22, 0.08);
  --color-bg-7: rgba(236, 72, 153, 0.08);
  --color-bg-8: rgba(6, 182, 212, 0.08);
  --color-background: var(--color-cream-50);
  --color-surface: var(--color-cream-100);
  --color-text: var(--color-slate-900);
  --color-text-secondary: var(--color-slate-500);
  --color-primary: var(--color-teal-500);
  --color-primary-hover: var(--color-teal-600);
  --color-primary-active: var(--color-teal-700);
  --color-secondary: rgba(var(--color-brown-600-rgb), 0.12);
  --color-secondary-hover: rgba(var(--color-brown-600-rgb), 0.2);
  --color-secondary-active: rgba(var(--color-brown-600-rgb), 0.25);
  --color-border: rgba(var(--color-brown-600-rgb), 0.2);
  --color-btn-primary-text: var(--color-cream-50);
  --color-card-border: rgba(var(--color-brown-600-rgb), 0.12);
  --color-card-border-inner: rgba(var(--color-brown-600-rgb), 0.12);
  --color-error: var(--color-red-500);
  --color-success: var(--color-teal-500);
  --color-warning: var(--color-orange-500);
  --color-info: var(--color-slate-500);
  --color-focus-ring: rgba(var(--color-teal-500-rgb), 0.4);
  --color-select-caret: rgba(var(--color-slate-900-rgb), 0.8);
  --focus-ring: 0 0 0 3px var(--color-focus-ring);
  --focus-outline: 2px solid var(--color-primary);
  --status-bg-opacity: 0.15;
  --status-border-opacity: 0.25;
  --font-family-base: "FKGroteskNeue", "Geist", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --font-family-mono: "Berkeley Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 14px;
  --font-size-lg: 16px;
  --font-size-xl: 18px;
  --font-size-2xl: 20px;
  --font-size-3xl: 24px;
  --font-size-4xl: 30px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 550;
  --font-weight-bold: 600;
  --line-height-tight: 1.2;
  --line-height-normal: 1.5;
  --letter-spacing-tight: -0.01em;
  --space-0: 0;
  --space-1: 1px;
  --space-2: 2px;
  --space-4: 4px;
  --space-6: 6px;
  --space-8: 8px;
  --space-10: 10px;
  --space-12: 12px;
  --space-16: 16px;
  --space-20: 20px;
  --space-24: 24px;
  --space-32: 32px;
  --radius-sm: 6px;
  --radius-base: 8px;
  --radius-md: 10px;
  --radius-lg: 12px;
  --radius-full: 9999px;
  --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.02);
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.04), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
  --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
  --shadow-inset-sm: inset 0 1px 0 rgba(255, 255, 255, 0.15), inset 0 -1px 0 rgba(0, 0, 0, 0.03);
  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --ease-standard: cubic-bezier(0.16, 1, 0.3, 1);
  --container-sm: 640px;
  --container-md: 768px;
  --container-lg: 1024px;
  --container-xl: 1280px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --color-gray-400-rgb: 119, 124, 124;
    --color-teal-300-rgb: 50, 184, 198;
    --color-gray-300-rgb: 167, 169, 169;
    --color-gray-200-rgb: 245, 245, 245;
    --color-bg-1: rgba(29, 78, 216, 0.15);
    --color-bg-2: rgba(180, 83, 9, 0.15);
    --color-bg-3: rgba(21, 128, 61, 0.15);
    --color-bg-4: rgba(185, 28, 28, 0.15);
    --color-bg-5: rgba(107, 33, 168, 0.15);
    --color-bg-6: rgba(194, 65, 12, 0.15);
    --color-bg-7: rgba(190, 24, 93, 0.15);
    --color-bg-8: rgba(8, 145, 178, 0.15);
    --color-background: var(--color-charcoal-700);
    --color-surface: var(--color-charcoal-800);
    --color-text: var(--color-gray-200);
    --color-text-secondary: rgba(var(--color-gray-300-rgb), 0.7);
    --color-primary: var(--color-teal-300);
    --color-primary-hover: var(--color-teal-400);
    --color-primary-active: var(--color-teal-800);
    --color-secondary: rgba(var(--color-gray-400-rgb), 0.15);
    --color-secondary-hover: rgba(var(--color-gray-400-rgb), 0.25);
    --color-secondary-active: rgba(var(--color-gray-400-rgb), 0.3);
    --color-border: rgba(var(--color-gray-400-rgb), 0.3);
    --color-error: var(--color-red-400);
    --color-success: var(--color-teal-300);
    --color-warning: var(--color-orange-400);
    --color-info: var(--color-gray-300);
    --color-focus-ring: rgba(var(--color-teal-300-rgb), 0.4);
    --color-btn-primary-text: var(--color-slate-900);
    --color-card-border: rgba(var(--color-gray-400-rgb), 0.2);
    --color-card-border-inner: rgba(var(--color-gray-400-rgb), 0.15);
    --shadow-inset-sm: inset 0 1px 0 rgba(255, 255, 255, 0.1), inset 0 -1px 0 rgba(0, 0, 0, 0.15);
    --color-select-caret: rgba(var(--color-gray-200-rgb), 0.8);
    --color-success-rgb: var(--color-teal-300-rgb);
    --color-error-rgb: var(--color-red-400-rgb);
    --color-warning-rgb: var(--color-orange-400-rgb);
    --color-info-rgb: var(--color-gray-300-rgb);
  }
}

@font-face {
  font-family: 'FKGroteskNeue';
  src: url('https://r2cdn.perplexity.ai/fonts/FKGroteskNeue.woff2') format('woff2');
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    font-family: var(--font-family-base);
    background-color: var(--color-background);
    color: var(--color-text);
    line-height: var(--line-height-normal);
    font-size: var(--font-size-base);
    -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
    position: sticky;
    top: 0;
    z-index: 100;
    background-color: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    padding: var(--space-16) var(--space-24);
    box-shadow: var(--shadow-sm);
}

.header-content {
    max-width: 1600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: var(--space-24);
}

.header-title {
    font-size: var(--font-size-2xl);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text);
    white-space: nowrap;
}

.header-search {
    flex: 1;
    max-width: 600px;
}

.search-input {
    width: 100%;
    padding: var(--space-12) var(--space-16);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-base);
    font-size: var(--font-size-md);
    background-color: var(--color-background);
    color: var(--color-text);
    transition: all var(--duration-fast) var(--ease-standard);
}

.search-input:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: var(--focus-ring);
}

.search-input::placeholder {
    color: var(--color-text-secondary);
}

.mobile-menu-btn {
    display: none;
    padding: var(--space-8);
    background: var(--color-secondary);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-base);
    cursor: pointer;
    color: var(--color-text);
}

/* Main Layout */
.main-layout {
    display: flex;
    max-width: 1600px;
    margin: 0 auto;
    min-height: calc(100vh - 80px);
}

/* Sidebar */
.sidebar {
    width: 300px;
    background-color: var(--color-surface);
    border-right: 1px solid var(--color-border);
    padding: var(--space-24);
    overflow-y: auto;
    height: calc(100vh - 80px);
    position: sticky;
    top: 80px;
}

.sidebar-title {
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-semibold);
    margin-bottom: var(--space-16);
    color: var(--color-text);
}

.category-tree {
    list-style: none;
}

.category-item {
    margin-bottom: var(--space-8);
}

.category-label {
    display: flex;
    align-items: center;
    padding: var(--space-8) var(--space-12);
    cursor: pointer;
    border-radius: var(--radius-base);
    transition: background-color var(--duration-fast) var(--ease-standard);
    font-weight: var(--font-weight-medium);
    color: var(--color-text);
}

.category-label:hover {
    background-color: var(--color-secondary);
}

.category-label.active {
    background-color: var(--color-primary);
    color: var(--color-btn-primary-text);
}

.category-icon {
    margin-right: var(--space-8);
    font-size: var(--font-size-sm);
}

.subcategory-list {
    list-style: none;
    padding-left: var(--space-24);
    margin-top: var(--space-8);
}

.subcategory-item {
    padding: var(--space-6) var(--space-12);
    cursor: pointer;
    border-radius: var(--radius-base);
    transition: background-color var(--duration-fast) var(--ease-standard);
    margin-bottom: var(--space-4);
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
}

.subcategory-item:hover {
    background-color: var(--color-secondary);
    color: var(--color-text);
}

.subcategory-item.active {
    background-color: var(--color-secondary);
    color: var(--color-primary);
    font-weight: var(--font-weight-medium);
}

/* Main Content */
.main-content {
    flex: 1;
    padding: var(--space-24);
    overflow-y: auto;
}

.content-header {
    margin-bottom: var(--space-24);
}

.result-count {
    font-size: var(--font-size-md);
    color: var(--color-text-secondary);
}

.result-count strong {
    color: var(--color-primary);
    font-weight: var(--font-weight-semibold);
}

/* Vehicle Grid */
.vehicle-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: var(--space-24);
}

.vehicle-card {
    background-color: var(--color-surface);
    border: 1px solid var(--color-card-border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: all var(--duration-normal) var(--ease-standard);
    cursor: pointer;
    position: relative;
}

.vehicle-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
}

.vehicle-image {
    width: 100%;
    height: 180px;
    background: linear-gradient(135deg, var(--color-bg-1) 0%, var(--color-bg-2) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-secondary);
    font-size: 64px;
    border-bottom: 1px solid var(--color-card-border);
}

.vehicle-content {
    padding: var(--space-16);
}

.vehicle-type {
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-semibold);
    margin-bottom: var(--space-8);
    color: var(--color-text);
}

.vehicle-description {
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
    margin-bottom: var(--space-12);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.vehicle-tags {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-6);
    margin-bottom: var(--space-12);
}

.tag {
    padding: var(--space-4) var(--space-8);
    background-color: var(--color-secondary);
    border-radius: var(--radius-full);
    font-size: var(--font-size-xs);
    color: var(--color-text);
    font-weight: var(--font-weight-medium);
}

.vehicle-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-8);
}

.btn-detail {
    flex: 1;
    padding: var(--space-8) var(--space-16);
    background-color: var(--color-primary);
    color: var(--color-btn-primary-text);
    border: none;
    border-radius: var(--radius-base);
    font-size: var(--font-size-sm);
    font-weight: var(--font-weight-medium);
    cursor: pointer;
    transition: background-color var(--duration-fast) var(--ease-standard);
}

.btn-detail:hover {
    background-color: var(--color-primary-hover);
}

.compare-checkbox {
    display: flex;
    align-items: center;
    gap: var(--space-6);
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
}

.compare-checkbox input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: var(--color-primary);
}

/* Right Sidebar */
.right-sidebar {
    width: 280px;
    background-color: var(--color-surface);
    border-left: 1px solid var(--color-border);
    padding: var(--space-24);
    overflow-y: auto;
    height: calc(100vh - 80px);
    position: sticky;
    top: 80px;
}

.sidebar-section {
    margin-bottom: var(--space-32);
}

.sidebar-section-title {
    font-size: var(--font-size-md);
    font-weight: var(--font-weight-semibold);
    margin-bottom: var(--space-12);
    color: var(--color-text);
}

.filter-group {
    margin-bottom: var(--space-16);
}

.filter-label {
    display: block;
    margin-bottom: var(--space-6);
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
    font-weight: var(--font-weight-medium);
}

.filter-select {
    width: 100%;
    padding: var(--space-8) var(--space-12);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-base);
    background-color: var(--color-background);
    color: var(--color-text);
    font-size: var(--font-size-sm);
    cursor: pointer;
}

.comparison-list {
    list-style: none;
}

.comparison-item {
    padding: var(--space-8);
    background-color: var(--color-secondary);
    border-radius: var(--radius-base);
    margin-bottom: var(--space-8);
    font-size: var(--font-size-sm);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.remove-btn {
    background: none;
    border: none;
    color: var(--color-error);
    cursor: pointer;
    font-size: var(--font-size-lg);
    padding: 0;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.btn-compare {
    width: 100%;
    padding: var(--space-12);
    background-color: var(--color-primary);
    color: var(--color-btn-primary-text);
    border: none;
    border-radius: var(--radius-base);
    font-size: var(--font-size-md);
    font-weight: var(--font-weight-medium);
    cursor: pointer;
    transition: background-color var(--duration-fast) var(--ease-standard);
}

.btn-compare:hover {
    background-color: var(--color-primary-hover);
}

.btn-compare:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.empty-state {
    text-align: center;
    padding: var(--space-24);
    color: var(--color-text-secondary);
    font-size: var(--font-size-sm);
}

/* Modal */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: var(--space-24);
}

.modal.active {
    display: flex;
}

.modal-content {
    background-color: var(--color-surface);
    border-radius: var(--radius-lg);
    max-width: 800px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    position: relative;
}

.modal-header {
    padding: var(--space-24);
    border-bottom: 1px solid var(--color-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background-color: var(--color-surface);
    z-index: 10;
}

.modal-title {
    font-size: var(--font-size-2xl);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text);
}

.modal-close {
    background: none;
    border: none;
    font-size: var(--font-size-3xl);
    cursor: pointer;
    color: var(--color-text-secondary);
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-base);
    transition: background-color var(--duration-fast) var(--ease-standard);
}

.modal-close:hover {
    background-color: var(--color-secondary);
}

.modal-body {
    padding: var(--space-24);
}

.modal-image {
    width: 100%;
    height: 300px;
    background: linear-gradient(135deg, var(--color-bg-3) 0%, var(--color-bg-4) 100%);
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-secondary);
    font-size: 120px;
    margin-bottom: var(--space-24);
}

.modal-section {
    margin-bottom: var(--space-24);
}

.modal-section-title {
    font-size: var(--font-size-lg);
    font-weight: var(--font-weight-semibold);
    margin-bottom: var(--space-12);
    color: var(--color-text);
}

.modal-description {
    font-size: var(--font-size-base);
    line-height: 1.6;
    color: var(--color-text);
    margin-bottom: var(--space-16);
}

.info-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-16);
    margin-bottom: var(--space-16);
}

.info-item {
    padding: var(--space-12);
    background-color: var(--color-secondary);
    border-radius: var(--radius-base);
}

.info-label {
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
    margin-bottom: var(--space-4);
}

.info-value {
    font-size: var(--font-size-md);
    font-weight: var(--font-weight-medium);
    color: var(--color-text);
}

.notes-list {
    list-style: none;
    padding-left: 0;
}

.notes-list li {
    padding: var(--space-12);
    background-color: var(--color-bg-6);
    border-left: 3px solid var(--color-warning);
    margin-bottom: var(--space-8);
    border-radius: var(--radius-sm);
    font-size: var(--font-size-sm);
    line-height: 1.5;
    color: var(--color-text);
}

/* Comparison Modal */
.comparison-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: var(--space-16);
}

.comparison-table th,
.comparison-table td {
    padding: var(--space-12);
    border: 1px solid var(--color-border);
    text-align: left;
    font-size: var(--font-size-sm);
}

.comparison-table th {
    background-color: var(--color-secondary);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text);
}

.comparison-table td {
    color: var(--color-text);
}

.comparison-image {
    width: 100%;
    height: 150px;
    background: linear-gradient(135deg, var(--color-bg-5) 0%, var(--color-bg-6) 100%);
    border-radius: var(--radius-base);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-text-secondary);
    font-size: 64px;
}

/* Responsive Design */

        // Initialize app

            renderCategories();
            renderVehicles(vehicleData);
            setupEventListeners();
            updateResultCount();
        }

        // Render categories
        function renderCategories() {
            const categoryTree = document.getElementById('categoryTree');
            const categories = {};

            vehicleData.forEach(vehicle => {
                if (!categories[vehicle.category]) {
                    categories[vehicle.category] = new Set();
                }
                categories[vehicle.category].add(vehicle.subcategory);
            });

            let html = '';
            Object.keys(categories).forEach(category => {
                html += `
                    <li class="category-item">
                        <div class="category-label" data-category="${category}">
                            <span class="category-icon">▶</span>
                            <span>${category}</span>
                        </div>
                        <ul class="subcategory-list hidden">
                `;
                
                Array.from(categories[category]).forEach(subcategory => {
                    html += `
                        <li class="subcategory-item" data-category="${category}" data-subcategory="${subcategory}">
                            ${subcategory}
                        </li>
                    `;
                });
                
                html += `
                        </ul>
                    </li>
                `;
            });

            categoryTree.innerHTML = html;
        }

        // Render vehicles
        function renderVehicles(vehicles) {
            const grid = document.getElementById('vehicleGrid');
            const emptyState = document.getElementById('emptyState');

            if (vehicles.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');

            grid.innerHTML = vehicles.map(vehicle => `
                <div class="vehicle-card" data-id="${vehicle.id}">
                    <div class="vehicle-image">${vehicle.icon}</div>
                    <div class="vehicle-content">
                        <h3 class="vehicle-type">${vehicle.type}</h3>
                        <p class="vehicle-description">${vehicle.description}</p>
                        <div class="vehicle-tags">
                            ${vehicle.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        <div class="vehicle-footer">
                            <button class="btn-detail" onclick="showDetail('${vehicle.id}')">상세보기</button>
                            <label class="compare-checkbox">
                                <input type="checkbox" 
                                    data-vehicle-id="${vehicle.id}" 
                                    onchange="toggleComparison('${vehicle.id}')"
                                    ${comparisonList.some(v => v.id === vehicle.id) ? 'checked' : ''}>
                                <span>비교</span>
                            </label>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Show vehicle detail

            if (!vehicle) return;

            const modal = document.getElementById('detailModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalBody = document.getElementById('modalBody');

            modalTitle.textContent = vehicle.type;
            modalBody.innerHTML = `
                <div class="modal-image">${vehicle.icon}</div>
                <div class="modal-section">
                    <h4 class="modal-section-title">설명</h4>
                    <p class="modal-description">${vehicle.description}</p>
                </div>
                <div class="modal-section">
                    <div class="info-grid">
                        <div class="info-item">
                            <div class="info-label">카테고리</div>
                            <div class="info-value">${vehicle.category}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">세부분류</div>
                            <div class="info-value">${vehicle.subcategory}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">트레일러 여부</div>
                            <div class="info-value">${vehicle.hasTrailer ? '있음' : '없음'}</div>
                        </div>
                        <div class="info-item">
                            <div class="info-label">태그</div>
                            <div class="info-value">${vehicle.tags.join(', ')}</div>
                        </div>
                    </div>
                </div>
                ${vehicle.notes && vehicle.notes.length > 0 ? `
                    <div class="modal-section">
                        <h4 class="modal-section-title">특이사항 및 주의사항</h4>
                        <ul class="notes-list">
                            ${vehicle.notes.map(note => `<li>${note}</li>`).join('')}
                        </ul>
                    </div>
                ` : ''}
            `;

            modal.classList.add('active');
        }

        // Toggle comparison
        function toggleComparison(vehicleId) {
            const vehicle = vehicleData.find(v => v.id === vehicleId);
            const index = comparisonList.findIndex(v => v.id === vehicleId);

            if (index > -1) {
                comparisonList.splice(index, 1);
            } else {
                if (comparisonList.length >= 3) {
                    alert('최대 3개까지만 비교할 수 있습니다.');
                    const checkbox = document.querySelector(`input[data-vehicle-id="${vehicleId}"]`);
                    if (checkbox) checkbox.checked = false;
                    return;
                }
                comparisonList.push(vehicle);
            }

            renderComparisonList();
            renderVehicles(filteredVehicles);
        }

        // Render comparison list
        function renderComparisonList() {
            const list = document.getElementById('comparisonList');
            const emptyComparison = document.getElementById('emptyComparison');
            const compareBtn = document.getElementById('compareBtn');
            const countSpan = document.getElementById('comparisonCount');

            countSpan.textContent = comparisonList.length;

            if (comparisonList.length === 0) {
                list.innerHTML = '';
                emptyComparison.style.display = 'block';
                compareBtn.disabled = true;
            } else {
                emptyComparison.style.display = 'none';
                compareBtn.disabled = comparisonList.length < 2;
                list.innerHTML = comparisonList.map(vehicle => `
                    <li class="comparison-item">
                        <span>${vehicle.type}</span>
                        <button class="remove-btn" onclick="toggleComparison('${vehicle.id}')">&times;</button>
                    </li>
                `).join('');
            }
        }

        // Show comparison modal
        function showComparison() {
            if (comparisonList.length < 2) return;

            const modal = document.getElementById('comparisonModal');
            const modalBody = document.getElementById('comparisonModalBody');

            const fields = [
                { label: '차량 이미지', key: 'icon', render: (v) => `<div class="comparison-image">${v.icon}</div>` },
                { label: '차량 유형', key: 'type' },
                { label: '카테고리', key: 'category' },
                { label: '세부분류', key: 'subcategory' },
                { label: '설명', key: 'description' },
                { label: '트레일러', key: 'hasTrailer', render: (v) => v.hasTrailer ? '있음' : '없음' },
                { label: '태그', key: 'tags', render: (v) => v.tags.join(', ') }
            ];

            let tableHtml = '<table class="comparison-table"><thead><tr><th>구분</th>';
            comparisonList.forEach(vehicle => {
                tableHtml += `<th>${vehicle.type}</th>`;
            });
            tableHtml += '</tr></thead><tbody>';

            fields.forEach(field => {
                tableHtml += `<tr><td><strong>${field.label}</strong></td>`;
                comparisonList.forEach(vehicle => {
                    const value = field.render ? field.render(vehicle) : vehicle[field.key];
                    tableHtml += `<td>${value}</td>`;
                });
                tableHtml += '</tr>';
            });

            tableHtml += '</tbody></table>';
            modalBody.innerHTML = tableHtml;
            modal.classList.add('active');
        }

        // Filter vehicles
        function filterVehicles() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            const trailerFilter = document.getElementById('trailerFilter').value;

            filteredVehicles = vehicleData.filter(vehicle => {
                const matchSearch = searchTerm === '' || 
                    vehicle.type.toLowerCase().includes(searchTerm) ||
                    vehicle.description.toLowerCase().includes(searchTerm) ||
                    vehicle.tags.some(tag => tag.toLowerCase().includes(searchTerm));

                const matchCategory = categoryFilter === '' || vehicle.category === categoryFilter;
                
                const matchTrailer = trailerFilter === '' || 
                    vehicle.hasTrailer === (trailerFilter === 'true');

                const matchSelectedCategory = !selectedCategory || vehicle.category === selectedCategory;
                const matchSelectedSubcategory = !selectedSubcategory || vehicle.subcategory === selectedSubcategory;

                return matchSearch && matchCategory && matchTrailer && matchSelectedCategory && matchSelectedSubcategory;
            });

            renderVehicles(filteredVehicles);
            updateResultCount();
        }

        // Update result count
        function updateResultCount() {
            const count = document.getElementById('resultCount');
            count.innerHTML = `총 <strong>${filteredVehicles.length}</strong>개 차량 유형`;
        }

        // Setup event listeners
        function setupEventListeners() {
            // Search input
            document.getElementById('searchInput').addEventListener('input', filterVehicles);

            // Category filter
            document.getElementById('categoryFilter').addEventListener('change', filterVehicles);

            // Trailer filter
            document.getElementById('trailerFilter').addEventListener('change', filterVehicles);

            // Compare button
            document.getElementById('compareBtn').addEventListener('click', showComparison);

            // Modal close buttons
            document.getElementById('closeDetailModal').addEventListener('click', () => {
                document.getElementById('detailModal').classList.remove('active');
            });

            document.getElementById('closeComparisonModal').addEventListener('click', () => {
                document.getElementById('comparisonModal').classList.remove('active');
            });

            // Modal background click
            document.getElementById('detailModal').addEventListener('click', (e) => {
                if (e.target.id === 'detailModal') {
                    document.getElementById('detailModal').classList.remove('active');
                }
            });

            document.getElementById('comparisonModal').addEventListener('click', (e) => {
                if (e.target.id === 'comparisonModal') {
                    document.getElementById('comparisonModal').classList.remove('active');
                }
            });

            // Mobile menu
            document.getElementById('mobileMenuBtn').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('active');
            });

            // Category tree
            document.addEventListener('click', (e) => {
                if (e.target.closest('.category-label')) {
                    const label = e.target.closest('.category-label');
                    const category = label.dataset.category;
                    const subcategoryList = label.nextElementSibling;
                    const icon = label.querySelector('.category-icon');

                    subcategoryList.classList.toggle('hidden');
                    icon.textContent = subcategoryList.classList.contains('hidden') ? '▶' : '▼';

                    // Filter by category
                    selectedCategory = category;
                    selectedSubcategory = null;
                    
                    // Update active state
                    document.querySelectorAll('.category-label').forEach(l => l.classList.remove('active'));
                    document.querySelectorAll('.subcategory-item').forEach(s => s.classList.remove('active'));
                    label.classList.add('active');
                    
                    filterVehicles();
                }

                if (e.target.closest('.subcategory-item')) {
                    const item = e.target.closest('.subcategory-item');
                    const category = item.dataset.category;
                    const subcategory = item.dataset.subcategory;

                    selectedCategory = category;
                    selectedSubcategory = subcategory;

                    // Update active state
                    document.querySelectorAll('.subcategory-item').forEach(s => s.classList.remove('active'));
                    document.querySelectorAll('.category-label').forEach(l => l.classList.remove('active'));
                    item.classList.add('active');

                    filterVehicles();
                }
            });
        }

        // Initialize the application
        init();
    </script>
</body>
</html>
